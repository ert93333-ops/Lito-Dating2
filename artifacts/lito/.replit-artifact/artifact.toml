kind = "mobile"
previewPath = "/"
title = "Lito - Korean-Japanese Dating App"
version = "1.0.0"
id = "artifacts/lito"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18688

[services.development]
run = "pnpm --filter @workspace/lito run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lito", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/lito", "run", "serve" ]

[services.env]
PORT = "18688"
BASE_PATH = "/"
